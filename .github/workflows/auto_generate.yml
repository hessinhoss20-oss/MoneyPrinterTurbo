name: Daily Video Generator

on:
  schedule:
    # تشغيل الأتمتة تلقائياً كل يوم الساعة 7صباحا بتوقيت مصر
    - cron: '0 7 * * *'
    - cron: '2 3* * *'
    workflow_dispatch: # يتيح لك تشغيل الأتمتة يدوياً في أي وقت للتجربة
    jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-framework: '3.10'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run MoneyPrinterTurbo
      env:
        PEXELS_API_KEY: ${{KuyOuxrcPQTG5s7fEB5ns3tefvNJUq8ndBDkrzr729u8VCjlTBGIicLR}}
        GEMINI_API_KEY: ${{ AQ.Ab8RN6LcIi4WPYgQPa0a0_n-sWC5sbyppPwDPt0HstaGpMHgWQ }}
      run: |
        python main.py --prompt "اكتب قصة قصيرة ومثيرة عن لغز اختفاء قارة أتلانتس، واجعل الأسلوب غامضاً ومناسباً لـ Shorts"
